<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="pr-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="pr-hl" cx="35%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="44" fill="url(#pr-g)"/>
  <circle cx="50" cy="50" r="44" fill="url(#pr-hl)"/>
  <!-- Pencil body -->
  <rect x="38" y="22" width="16" height="48" rx="3" fill="#fff" transform="rotate(-15 46 46)"/>
  <!-- Pencil tip -->
  <polygon points="36,70 42,80 48,70" fill="#fff" transform="rotate(-15 42 75)" opacity=".9"/>
  <!-- Pencil top eraser -->
  <rect x="38" y="18" width="16" height="8" rx="3" fill="rgba(255,255,255,.6)" transform="rotate(-15 46 22)"/>
  <!-- Pencil stripe -->
  <rect x="40" y="42" width="12" height="4" rx="2" fill="url(#pr-g)" opacity=".5" transform="rotate(-15 46 44)"/>
</svg>
