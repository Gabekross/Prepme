<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="hs-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="hs-hl" cx="35%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="44" fill="url(#hs-g)"/>
  <circle cx="50" cy="50" r="44" fill="url(#hs-hl)"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="28" stroke="#fff" stroke-width="2.5" opacity=".3"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="16" stroke="#fff" stroke-width="2.5" opacity=".5"/>
  <!-- Crosshair lines -->
  <g stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".45">
    <line x1="50" y1="12" x2="50" y2="30"/>
    <line x1="50" y1="70" x2="50" y2="88"/>
    <line x1="12" y1="50" x2="30" y2="50"/>
    <line x1="70" y1="50" x2="88" y2="50"/>
  </g>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="6" fill="#fff" opacity=".9"/>
</svg>
